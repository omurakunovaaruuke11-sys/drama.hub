<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Learn • Корейский с дорамами</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;700&display=swap');
        
        * { font-family: 'Inter', system-ui, sans-serif; }
        .korean-font { font-family: 'Noto Sans KR', sans-serif; }
        
        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }
        
        .netflix-gradient {
            background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%);
        }
        
        .vocab-item {
            transition: all 0.2s ease;
        }
        .vocab-item:hover {
            background-color: #334155;
        }
    </style>
</head>
<body class="netflix-gradient text-white min-h-screen">

    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#00c4b4] rounded-xl flex items-center justify-center text-2xl">🇰🇷</div>
                <span class="text-2xl font-semibold tracking-tighter">K-Learn</span>
            </div>

            <div class="hidden md:flex items-center gap-x-8 text-sm font-medium">
                <a onclick="navigateTo('home')" class="hover:text-[#00c4b4]">Главная</a>
                <a onclick="navigateTo('grammar')" class="hover:text-[#00c4b4]">Грамматика</a>
                <a onclick="navigateTo('dramas')" class="hover:text-[#00c4b4]">Дорамы</a>
                <a onclick="navigateTo('streak')" class="hover:text-[#00c4b4]">Серия</a>
            </div>

            <div class="flex items-center gap-x-4">
                <div onclick="showStreakModal()" class="flex items-center gap-x-2 bg-slate-800 px-4 py-2 rounded-3xl cursor-pointer">
                    <i class="fas fa-fire text-orange-400 text-xl"></i>
                    <span id="streak-count" class="font-semibold text-lg">0</span>
                </div>

                <div onclick="toggleProfile()" id="profile-btn" class="flex items-center gap-x-3 cursor-pointer">
                    <div id="user-avatar" class="w-8 h-8 bg-[#00c4b4] rounded-2xl flex items-center justify-center font-medium">Г</div>
                    <span id="username-display" class="font-medium text-sm">Гость</span>
                </div>

                <button onclick="showAuthModal()" id="login-btn" 
                        class="bg-white text-slate-900 px-5 py-2 rounded-3xl font-semibold hover:bg-[#00c4b4] hover:text-white">
                    Войти
                </button>
            </div>
        </div>
    </nav>

    <!-- ДОРАМЫ -->
    <section id="dramas-section" class="max-w-7xl mx-auto px-6 py-16">
        <h2 class="text-4xl font-bold mb-2">Дорамы для изучения корейского</h2>
        <p class="text-slate-400 mb-8">Алхимия душ • Алые сердца: Корё • С транскрипцией и переводом</p>

        <div id="dramas-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Заполняется JS -->
        </div>
    </section>

    <!-- МОДАЛЬ ПРОСМОТРА ДОРАМЫ -->
    <div id="drama-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[9999]">
        <div class="modal bg-slate-900 w-full max-w-5xl mx-4 rounded-3xl overflow-hidden flex flex-col md:flex-row">
            
            <!-- Плеер -->
            <div class="flex-1">
                <div class="aspect-video bg-black">
                    <iframe id="drama-player" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
            
            <!-- Панель словаря с транскрипцией -->
            <div class="w-full md:w-96 bg-slate-800 p-6 flex flex-col">
                <h3 class="font-semibold text-lg mb-4 flex items-center gap-2">
                    <span>Словарь из дорамы</span>
                    <span class="text-xs bg-teal-500 px-2 py-0.5 rounded">с транскрипцией</span>
                </h3>
                
                <div id="vocab-list" class="flex-1 space-y-3 overflow-y-auto pr-2">
                    <!-- Заполняется JS -->
                </div>
                
                <button onclick="hideDramaModal()" 
                        class="mt-6 w-full py-4 bg-white text-slate-900 rounded-3xl font-semibold">
                    Закрыть
                </button>
            </div>
        </div>
    </div>

    <script>
        // === ДОРАМЫ С ТРАНСКРИПЦИЕЙ ===
        const dramasData = [
            {
                id: 1,
                title: "Алхимия душ",
                koreanTitle: "환혼",
                level: 2,
                description: "Средний уровень • Русские субтитры",
                embed: "https://www.youtube.com/embed/videoseries?list=PLXmS7Ry-YYvjAmGdp3jzGWxNSlAIK-cJw",
                vocab: [
                    { ko: "환혼", trans: "Hwan-hon", ru: "алхимия душ / переселение душ" },
                    { ko: "마법", trans: "Mabeop", ru: "магия" },
                    { ko: "영혼", trans: "Yeonghon", ru: "душа" },
                    { ko: "운명", trans: "Unmyeong", ru: "судьба" },
                    { ko: "주술", trans: "Jusul", ru: "колдовство, заклинание" }
                ]
            },
            {
                id: 2,
                title: "Алые сердца: Корё",
                koreanTitle: "달의 연인 - 보령",
                level: 2,
                description: "Средний уровень • Русские субтитры",
                embed: "https://www.youtube.com/playlist?list=PLV3Rowp-9vnkB6veJdCEEpet_tuI8uod3",
                vocab: [
                    { ko: "사랑", trans: "Sarang", ru: "любовь" },
                    { ko: "왕자", trans: "Wangja", ru: "принц" },
                    { ko: "궁", trans: "Gung", ru: "дворец" },
                    { ko: "역사", trans: "Yeoksa", ru: "история" },
                    { ko: "시간여행", trans: "Siganyeohaeng", ru: "путешествие во времени" }
                ]
            },
            {
                id: 3,
                title: "Алхимия душ 2",
                koreanTitle: "환혼: 빛과 그림자",
                level: 3,
                description: "Продвинутый уровень • Корейские субтитры",
                embed: "https://www.youtube.com/watch?v=ipxBGdplzZI",
                vocab: [
                    { ko: "빛", trans: "Bit", ru: "свет" },
                    { ko: "그림자", trans: "Geurimja", ru: "тень" },
                    { ko: "복수", trans: "Boksu", ru: "месть" },
                    { ko: "강력한", trans: "Gangnyeokhan", ru: "сильный, мощный" }
                ]
            }
        ];

        function renderDramas() {
            const container = document.getElementById('dramas-grid');
            container.innerHTML = '';

            dramasData.forEach(drama => {
                const card = document.createElement('div');
                card.className = "bg-slate-800 rounded-3xl overflow-hidden card-hover cursor-pointer";
                card.innerHTML = `
                    <div class="aspect-video bg-gradient-to-br from-slate-700 to-black flex items-center justify-center text-7xl relative">
                        📺
                        <div class="absolute top-4 right-4 px-4 py-1 text-xs font-bold rounded-3xl bg-[#00c4b4]">
                            ${drama.level === 2 ? 'Средний' : 'Продвинутый'}
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="font-semibold text-xl">${drama.title}</h3>
                        <p class="text-sm text-slate-400">${drama.koreanTitle}</p>
                        <p class="text-xs text-slate-500 mt-4">${drama.description}</p>
                        
                        <button onclick="event.stopImmediatePropagation(); playDrama(${drama.id});" 
                                class="mt-6 w-full bg-white text-slate-900 py-4 rounded-3xl font-semibold flex items-center justify-center gap-x-2">
                            <i class="fas fa-play"></i> Смотреть + учить слова
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function playDrama(id) {
            const drama = dramasData.find(d => d.id === id);
            if (!drama) return;

            // Открываем плеер
            document.getElementById('drama-player').src = drama.embed;

            // Заполняем словарь с транскрипцией
            const vocabContainer = document.getElementById('vocab-list');
            vocabContainer.innerHTML = '';

            drama.vocab.forEach(word => {
                const div = document.createElement('div');
                div.className = "vocab-item bg-slate-700 rounded-2xl p-4";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="korean-font text-2xl font-medium">${word.ko}</div>
                            <div class="text-teal-400 text-sm mt-1">${word.trans}</div>
                            <div class="text-slate-300 text-sm mt-2">${word.ru}</div>
                        </div>
                        <button onclick="event.stopImmediatePropagation(); alert('✅ Слово «${word.ko}» добавлено в твой словарь!');" 
                                class="text-[#00c4b4] text-2xl hover:scale-110 transition">
                            <i class="fas fa-plus-circle"></i>
                        </button>
                    </div>
                `;
                vocabContainer.appendChild(div);
            });

            // Показываем модальное окно
            document.getElementById('drama-modal').classList.remove('hidden');
            document.getElementById('drama-modal').classList.add('flex');
        }

        function hideDramaModal() {
            const modal = document.getElementById('drama-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.getElementById('drama-player').src = ''; // очищаем плеер
        }

        // Простая заглушка для других функций
        function navigateTo(section) {
            alert(`Раздел "${section}" скоро будет доступен.\n\nСейчас активно: Дорамы с транскрипцией!`);
        }
        function showStreakModal() { alert("🔥 Твоя серия: 7 дней! Продолжай в том же духе!"); }
        function toggleProfile() { alert("👋 Привет! Это демо-версия."); }
        function showAuthModal() { alert("Регистрация пока в разработке.\nИспользуй демо-режим."); }

        // Запуск сайта
        window.onload = () => {
            renderDramas();
            console.log('%c✅ K-Learn обновлён: Добавлена транскрипция к корейским словам!', 'color:#00c4b4; font-size:14px');
        };
    </script>
</body>
</html>
