<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-LEARN — Корейский как Netflix</title>
    <style>
        /* Общие стили */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505;
            color: white;
        }

        /* Шапка сайта */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.8);
            position: fixed;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo span {
            color: #E50914; /* Красный как у Netflix */
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: #ccc;
            transition: 0.3s;
        }

        nav a:hover {
            color: white;
        }

        .auth-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-login {
            background: white;
            color: black;
            padding: 8px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Главная секция (Герой) */
        .hero {
            height: 100vh;
            /* Заменил фон на ночной Сеул с затемнением */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1546706440-20164606771a?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 50px;
        }

        .hero h1 {
            font-size: 4rem;
            max-width: 600px;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .hero p {
            font-size: 1.2rem;
            color: #ddd;
            margin-bottom: 40px;
            max-width: 500px;
        }

        /* Исправленный блок кнопок (чтобы не накладывались) */
        .hero-controls {
            display: flex;
            align-items: center;
            gap: 25px; /* Четкий отступ между элементами */
            flex-wrap: wrap; /* Чтобы на мобилках не слипались */
        }

        .btn-primary {
            background: white;
            color: black;
            padding: 15px 35px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Карточка текущей дорамы (Алхимия душ) */
        .current-watch {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 250px;
        }

        .mini-poster {
            width: 40px;
            height: 40px;
            border-radius: 5px;
            object-fit: cover;
        }

        .info-text {
            font-size: 0.9rem;
        }

        .info-text b {
            display: block;
            color: #fff;
        }

        .info-text span {
            color: #aaa;
        }

        .progress-line {
            width: 100%;
            height: 4px;
            background: #444;
            margin-top: 5px;
            border-radius: 2px;
        }

        .progress-fill {
            width: 65%; /* Прогресс серии */
            height: 100%;
            background: #E50914;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>KR</span> K-LEARN</div>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="grammar.html">Грамматика</a></li>
                <li><a href="dramas.html">Дорамы</a></li>
                <li><a href="profile.html">Профиль</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <div class="streak">🔥 2 дня</div>
            <a href="#" class="btn-login">ВОЙТИ</a>
        </div>
    </header>

    <section class="hero">
        <h1>Изучай корейский через лучшие дорамы</h1>
        <p>Грамматика + живые диалоги + ежедневный streak. Минималистично. Красиво. Эффективно.</p>
        
        <div class="hero-controls">
            <a href="#" class="btn-primary">
                <span>▶</span> Начать уроки
            </a>

            <div class="current-watch">
                <img src="https://m.media-amazon.com/images/M/MV5BMTE0YWFmOTMtMDliMi00ZTIxLWE3OTEtZmNiYzBkMmViZDVmXkEyXkFqcGdeQXVyMTEzMTI1Mjk3._V1_.jpg" alt="poster" class="mini-poster">
                <div class="info-text">
                    <b>Алхимия душ • Серия 3</b>
                    <span>Осталось 42 минуты</span>
                    <div class="progress-line">
                        <div class="progress-fill"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
